    <video loop muted playsinline>
        <source src="assets/pieces//ae/fixedskr.mp4" type="video/mp4">
      </video>
    </div>
    <div class="video-card">
    <video loop muted playsinline>

      </video>
    </div>
  </div>
</div>

<script>
const imgs = document.querySelectorAll('.slideshow img');
const dotsEl = document.querySelector('.slideshow-dots');
let current = 0;

imgs.forEach((_, i) => {
  const dot = document.createElement('span');
  if (i === 0) dot.classList.add('active');
  dot.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(dot);
});

function goTo(n) {
  imgs[current].classList.remove('active');
  dotsEl.children[current].classList.remove('active');
  current = (n + imgs.length) % imgs.length;
  imgs[current].classList.add('active');
  dotsEl.children[current].classList.add('active');
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goTo(current + 1);
  if (e.key === 'ArrowLeft')  goTo(current - 1);
});

setInterval(() => goTo(current + 1), 4000);

document.querySelectorAll('.video-card video').forEach(vid => {
  vid.addEventListener('mouseenter', () => vid.play());
  vid.addEventListener('mouseleave', () => { vid.pause(); vid.currentTime = 0; });
});
</script>
